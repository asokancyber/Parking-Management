services:
  postgres:
    image: postgres:16-alpine
    container_name: parksphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parksphere
      POSTGRES_PASSWORD: parksphere_dev
      POSTGRES_DB: parksphere
    ports:
      - "5432:5432"
    volumes:
      - parksphere-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parksphere -d parksphere"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: parksphere-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - parksphere-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parksphere-pgdata:
  parksphere-redisdata:
